version: '3.8'
services:

  postgres:
    image: postgres:15
    container_name: smartcity-postgres
    environment:
      POSTGRES_DB: smartcity
      POSTGRES_USER: smartcity_user
      POSTGRES_PASSWORD: smartcity2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: smartcity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
spring.application.name=backend

# =====================
# PostgreSQL
# =====================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# HikariCP — keep the connection pool small for dev
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# =====================
# Redis
# =====================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.ssl.enabled=false

# =====================
# JWT
# =====================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# =====================
# Server
# =====================
server.port=${SERVER_PORT}

# =====================
# Gmail SMTP
# =====================
spring.mail.properties.mail.debug=true
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# =====================
# App
# =====================
app.base-url=${APP_BASE_URL}

# =====================
# Cloudinary
# =====================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# Allow large multipart uploads (up to 20 MB total)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# =====================
# Python AI Service
# =====================
ai.service.url=http://localhost:8000

# =====================
# Firebase (FCM Push Notifications)
# Set FIREBASE_SERVICE_ACCOUNT_PATH in .env to the path of your
# downloaded service-account.json file. Leave empty to disable FCM.
# =====================
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:}